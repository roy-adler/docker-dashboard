services:
  dashboard:
    build: .
    container_name: docker-dashboard
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DOCKER_SOCKET=/var/run/docker.sock
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - AUTH_SESSION_TTL_MINUTES=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
