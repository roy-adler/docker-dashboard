<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docker Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Docker Dashboard</h1>
      <div class="topbar-actions">
        <button id="refresh-btn">Refresh</button>
        <label class="toggle">
          <input type="checkbox" id="auto-refresh" checked />
          Auto refresh
        </label>
      </div>
    </header>

    <section class="system-card">
      <h2>Docker Engine</h2>
      <div id="system-info">Loading system info...</div>
    </section>

    <section class="content-grid">
      <article class="card">
        <h2>Containers</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Image</th>
                <th>State</th>
                <th>Status</th>
                <th>Ports</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="containers-body">
              <tr>
                <td colspan="6">Loading containers...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </article>

      <article class="card">
        <h2>Events</h2>
        <pre id="events-log" class="log-view"></pre>
      </article>
    </section>

    <section class="card">
      <div class="logs-header">
        <h2>Logs</h2>
        <div>
          <span id="logs-target">No container selected</span>
          <button id="close-logs-btn">Close stream</button>
        </div>
      </div>
      <pre id="container-logs" class="log-view"></pre>
    </section>

    <script src="/app.js" type="module"></script>
  </body>
</html>
